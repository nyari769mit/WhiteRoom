<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhiteRoom — Agent Governance Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050810; color: #e2e8f0; font-family: 'SF Mono','JetBrains Mono','Fira Code',monospace; font-size: 12px; }
button { font-family: inherit; cursor: pointer; }
select { font-family: inherit; }

.header { background: #0a0f1a; border-bottom: 1px solid #1e293b; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
.header-left { display: flex; align-items: center; gap: 10px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; transition: all 0.3s; }
.dot.on { background: #22c55e; box-shadow: 0 0 12px #22c55e; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 12px #22c55e; } 50% { box-shadow: 0 0 20px #22c55e; } }
.title { font-size: 15px; font-weight: 800; letter-spacing: 3px; }
.subtitle { font-size: 9px; color: #475569; border-left: 1px solid #334155; padding-left: 10px; }
.header-right { display: flex; gap: 6px; align-items: center; }

.mode-toggle { display: flex; background: #1e293b; border-radius: 5px; overflow: hidden; border: 1px solid #334155; }
.mode-btn { background: transparent; color: #64748b; border: none; padding: 4px 10px; font-size: 10px; font-weight: 600; }
.mode-btn.active { background: #334155; color: #e2e8f0; }

.btn-run { background: #166534; color: #fff; border: none; border-radius: 5px; padding: 5px 14px; font-size: 11px; font-weight: 700; }
.btn-run.stop { background: #991b1b; }
.btn-run:disabled { background: #475569; cursor: not-allowed; }
.btn-reset { background: transparent; color: #64748b; border: 1px solid #334155; border-radius: 5px; padding: 5px 10px; font-size: 11px; }
.speed-sel { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 5px; padding: 5px 8px; font-size: 11px; }
.status-txt { font-size: 9px; color: #64748b; }

.banner { background: linear-gradient(90deg,#052e16 0%,#0a0f1a 50%,#0c4a6e 100%); padding: 10px 20px; display: grid; grid-template-columns: repeat(7,1fr); gap: 1px; }
.banner-item { text-align: center; padding: 4px 0; }
.banner-label { font-size: 7px; color: #64748b; letter-spacing: 1.5px; }
.banner-value { font-size: 15px; font-weight: 700; transition: color 0.5s; }

.fleet-bar { padding: 10px 20px; background: #0a0f1a; border-bottom: 1px solid #1e293b; display: none; grid-template-columns: repeat(4,1fr); gap: 8px; }
.fleet-card { background: #050810; border-radius: 6px; padding: 8px 12px; text-align: center; border: 1px solid #1e293b; }
.fleet-label { font-size: 7px; color: #64748b; letter-spacing: 1.5px; }
.fleet-value { font-size: 18px; font-weight: 700; }

.main { display: grid; grid-template-columns: 1fr 280px; min-height: calc(100vh - 180px); }
.agents-col { padding: 12px 16px; overflow-y: auto; }
.log-col { border-left: 1px solid #1e293b; background: #050810; padding: 10px; overflow-y: auto; }

.pair-card { margin-bottom: 12px; background: #0a0f1a; border: 1px solid #1e293b; border-radius: 8px; overflow: hidden; }
.pair-header { padding: 6px 12px; background: #0f172a; border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; font-size: 9px; font-weight: 700; color: #94a3b8; letter-spacing: 1px; }
.pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: #1e293b; }

.agent-card { background: #0a0f1a; padding: 10px 12px; border-left: 3px solid #475569; transition: border-color 0.3s; }
.agent-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.agent-name { font-size: 11px; font-weight: 700; color: #e2e8f0; }
.agent-meta { font-size: 8px; color: #475569; }
.agent-badge { font-size: 7px; font-weight: 700; padding: 2px 6px; border-radius: 6px; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }

.progress-wrap { margin-bottom: 5px; }
.progress-labels { display: flex; justify-content: space-between; font-size: 7px; color: #475569; margin-bottom: 2px; }
.progress-bar { height: 3px; background: #1e293b; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease, background 0.5s; }

.stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 3px; }
.stat-box { background: #050810; border-radius: 3px; padding: 3px 4px; text-align: center; }
.stat-label { font-size: 6px; color: #475569; }
.stat-value { font-size: 11px; font-weight: 700; color: #e2e8f0; transition: color 0.5s; }

.compare { background: #0a0f1a; border: 1px solid #1e293b; border-radius: 8px; padding: 10px 14px; margin-top: 8px; }
.compare-title { font-size: 9px; font-weight: 700; color: #94a3b8; letter-spacing: 1px; margin-bottom: 8px; }
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.compare-no-rest { background: #1c0f0f; border: 1px solid #7f1d1d; border-radius: 6px; padding: 8px 10px; }
.compare-rest { background: #052e16; border: 1px solid #166534; border-radius: 6px; padding: 8px 10px; }

.log-title { font-size: 9px; font-weight: 700; color: #94a3b8; letter-spacing: 1px; margin-bottom: 8px; }
.log-empty { font-size: 10px; color: #334155; text-align: center; margin-top: 40px; }
.log-entry { margin-bottom: 3px; padding: 4px 6px; background: #0a0f1a; border-radius: 3px; border-left: 2px solid #334155; }
.log-entry span { font-size: 9px; color: #cbd5e1; line-height: 1.3; }

.footer { border-top: 1px solid #1e293b; padding: 5px 20px; display: flex; justify-content: space-between; font-size: 7px; color: #334155; background: #050810; }
.copyright { border-top: 1px solid #1e293b; padding: 8px 20px; text-align: center; font-size: 8px; color: #475569; background: #050810; }

.task-flash { animation: taskFlash 0.4s ease; }
@keyframes taskFlash { 0% { background: #0f2a1a; } 100% { background: #0a0f1a; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="dot" id="dot"></div>
    <span class="title">WHITE ROOM</span>
    <span class="subtitle">6h ON / 5min HANDOVER / 6h REST</span>
  </div>
  <div class="header-right">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-sim" onclick="switchMode('sim')">SIM</button>
      <button class="mode-btn" id="btn-live" onclick="switchMode('live')">LIVE</button>
    </div>
    <span class="status-txt" id="status-txt">Ready</span>
    <div id="sim-controls">
      <button class="btn-run" id="btn-run" onclick="toggleSim()">RUN</button>
    </div>
    <div id="live-controls" style="display:none;">
      <button class="btn-run" id="btn-live-run" onclick="toggleLive()">RUN LIVE</button>
    </div>
    <select class="speed-sel" id="speed-sel" onchange="spd=Number(this.value)">
      <option value="0.5">0.5x</option><option value="1" selected>1x</option><option value="2">2x</option><option value="4">4x</option>
    </select>
    <button class="btn-reset" onclick="resetAll()">Reset</button>
  </div>
</div>

<div class="banner" id="banner"></div>
<div class="fleet-bar" id="fleet-bar"></div>

<div class="main">
  <div class="agents-col" id="agents-col"></div>
  <div class="log-col">
    <div class="log-title">AUDIT LOG</div>
    <div id="log-container"><div class="log-empty">Press RUN to start</div></div>
  </div>
</div>

<div class="footer">
  <span id="footer-left">White Room v0.4 | Simulation Mode</span>
  <span>Maritime-inspired agent labor governance | MIT Sloan 15.S12</span>
</div>
<div class="copyright">© 2026 Nyari Nain · MIT Sloan · Artory.AI — All rights reserved</div>

<script>
// ─── Config ─────────────────────────────────────────────────
const WHITEROOM_URL = "https://whiteroom-m4j4.onrender.com";
const AGENTS_URL = "https://event-planning-relief.onrender.com";
const FLEET_ID = "event-planning-fleet";
const WATCH_TICKS = 72, REST_TICKS = 72;
const COST_PER_1K = 0.003, ENERGY_PER_1M = 0.4;

const PAIRS = [
  { a: { id: "alpha",   role: "Lead Planner",    color: "#3b82f6" },
    b: { id: "bravo",   role: "Planner (Relief)", color: "#6366f1" } },
  { a: { id: "charlie", role: "Coordinator",      color: "#8b5cf6" },
    b: { id: "delta",   role: "Coord. (Relief)",  color: "#a78bfa" } },
];

const TASKS = [
  { name: "Venue coordination",   tokens: 2800, priority: "HIGH",     minutes: 45 },
  { name: "Vendor negotiation",   tokens: 1900, priority: "NORMAL",   minutes: 30 },
  { name: "Guest list review",    tokens: 3200, priority: "HIGH",     minutes: 50 },
  { name: "Budget reconciliation",tokens: 1200, priority: "NORMAL",   minutes: 20 },
  { name: "Catering brief",       tokens: 800,  priority: "CRITICAL", minutes: 15 },
  { name: "Timeline draft",       tokens: 2100, priority: "NORMAL",   minutes: 35 },
  { name: "RSVP follow-up",       tokens: 1500, priority: "HIGH",     minutes: 25 },
  { name: "Decor planning",       tokens: 2600, priority: "NORMAL",   minutes: 40 },
];

const STATUS_COLORS = {
  working:      { bg: "#052e16", bd: "#22c55e", tx: "#4ade80" },
  overtime:     { bg: "#451a03", bd: "#f59e0b", tx: "#fbbf24" },
  handing_over: { bg: "#1e1b4b", bd: "#818cf8", tx: "#a5b4fc" },
  resting:      { bg: "#0c4a6e", bd: "#0ea5e9", tx: "#38bdf8" },
  alarm:        { bg: "#4c0519", bd: "#f43f5e", tx: "#fb7185" },
  idle:         { bg: "#1e293b", bd: "#475569", tx: "#94a3b8" },
};
const LOG_COLORS = {
  handover: "#818cf8", overtime: "#f59e0b", rest: "#0ea5e9",
  alarm: "#f43f5e", error: "#ef4444", info: "#334155", task: "#22c55e"
};

// ─── State ──────────────────────────────────────────────────
let mode = "sim", running = false, simInterval = null, liveInterval = null;
let spd = 1, tk = 0, selected = null;
let agents = [], logEntries = [];

function mkAgent(cfg, active) {
  return {
    ...cfg,
    status: active ? "working" : "resting",
    watchTick: 0, restTick: active ? 0 : REST_TICKS,
    watchNum: active ? 1 : 0,
    tasks: 0, handovers: 0, alarms: 0,
    ctx: 0,         // tokens WITH whitroom (context resets at handover)
    ctxNoRest: 0,   // tokens WITHOUT whiteroom (context grows forever)
    sent: 0,        // cumulative tokens sent WITH whiteroom
    sentNoRest: 0,  // cumulative tokens sent WITHOUT whiteroom
    health: active ? 100 : 100,
    baseline: 100,
    minutesWorked: 0,
    ctxHist: [],
    healthHist: [100],
  };
}

function initAgents() {
  agents = [];
  PAIRS.forEach(p => {
    agents.push(mkAgent(p.a, true));
    agents.push(mkAgent(p.b, false));
  });
}

function partner(id) {
  for (const p of PAIRS) {
    if (p.a.id === id) return p.b.id;
    if (p.b.id === id) return p.a.id;
  }
  return null;
}

function addLog(msg, type) {
  logEntries.unshift({ msg, type, time: new Date().toLocaleTimeString("en-US", { hour12: false }) });
  if (logEntries.length > 100) logEntries = logEntries.slice(0, 100);
  renderLog();
}

// ─── Rendering ──────────────────────────────────────────────
function renderBanner() {
  const tSent    = agents.reduce((s, a) => s + a.sent, 0);
  const tNoRest  = agents.reduce((s, a) => s + a.sentNoRest, 0);
  const savePct  = tNoRest > 0 ? ((1 - tSent / tNoRest) * 100) : 0;
  const cost     = (tSent / 1000) * COST_PER_1K;
  const costNR   = (tNoRest / 1000) * COST_PER_1K;
  const energy   = (tSent / 1000000) * ENERGY_PER_1M;
  const energyNR = (tNoRest / 1000000) * ENERGY_PER_1M;
  const avgHealth = agents.length > 0 ? agents.reduce((s, a) => s + a.health, 0) / agents.length : 100;

  const items = [
    { l: "TOKENS (WHITE ROOM)", v: (tSent / 1000).toFixed(1) + "K",           c: "#f8fafc" },
    { l: "TOKENS (NO REST)",    v: (tNoRest / 1000).toFixed(1) + "K",          c: "#ef4444" },
    { l: "TOKEN REDUCTION",     v: savePct.toFixed(1) + "%",                   c: savePct > 0 ? "#4ade80" : "#64748b" },
    { l: "COST SAVED",          v: "$" + (costNR - cost).toFixed(4),           c: savePct > 0 ? "#4ade80" : "#64748b" },
    { l: "ENERGY SAVED",        v: (energyNR - energy).toFixed(5) + " kWh",   c: savePct > 0 ? "#4ade80" : "#64748b" },
    { l: "AVG HEALTH",          v: avgHealth.toFixed(0) + "%",                 c: avgHealth >= 80 ? "#4ade80" : avgHealth >= 50 ? "#fbbf24" : "#ef4444" },
    { l: "FLEET WISDOM",        v: (agents.reduce((s,a)=>s+a.baseline,0)/Math.max(agents.length,1)).toFixed(0) + "%", c: "#f8fafc" },
  ];

  document.getElementById("banner").innerHTML = items.map(s =>
    `<div class="banner-item"><div class="banner-label">${s.l}</div><div class="banner-value" style="color:${s.c}">${s.v}</div></div>`
  ).join("");
}

function renderAgents() {
  const tSent   = agents.reduce((s, a) => s + a.sent, 0);
  const tNoRest = agents.reduce((s, a) => s + a.sentNoRest, 0);
  const cost    = (tSent / 1000) * COST_PER_1K;
  const costNR  = (tNoRest / 1000) * COST_PER_1K;
  const energy  = (tSent / 1000000) * ENERGY_PER_1M;
  const energyNR= (tNoRest / 1000000) * ENERGY_PER_1M;
  const savePct = tNoRest > 0 ? ((1 - tSent / tNoRest) * 100) : 0;

  let html = "";
  PAIRS.forEach((pair, pi) => {
    const a = agents.find(x => x.id === pair.a.id);
    const b = agents.find(x => x.id === pair.b.id);
    html += `<div class="pair-card">
      <div class="pair-header"><span>WATCH PAIR ${pi + 1}</span><span>Handovers: ${a.handovers + b.handovers}</span></div>
      <div class="pair-grid">`;

    [a, b].forEach(ag => {
      const sc = STATUS_COLORS[ag.status] || STATUS_COLORS.idle;
      const isRest = ag.status === "resting" || ag.status === "alarm";
      const prog = isRest ? ag.restTick / REST_TICKS : ag.watchTick / WATCH_TICKS;
      const pct = (Math.min(prog, 1) * 100).toFixed(0);
      const barColor = prog > 0.85 && !isRest ? "#f59e0b" : sc.bd;
      const healthPct = Math.min(ag.health, 100);
      const healthColor = ag.health >= 80 ? "#22c55e" : ag.health >= 55 ? "#4ade80" : ag.health >= 35 ? "#f59e0b" : "#ef4444";

      html += `<div class="agent-card" style="border-left-color:${sc.bd}">
        <div class="agent-top">
          <div>
            <div class="agent-name">${ag.id.toUpperCase()}</div>
            <div class="agent-meta">${ag.role} | Watch #${ag.watchNum} | ${ag.tasks} tasks</div>
          </div>
          <div class="agent-badge" style="background:${sc.bg};color:${sc.tx};border:1px solid ${sc.bd}">${ag.status === "handing_over" ? "HANDOVER" : ag.status.toUpperCase()}</div>
        </div>

        <div class="progress-wrap">
          <div class="progress-labels"><span>${isRest ? "Resting" : "Watch progress"}</span><span>${pct}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${barColor}"></div></div>
        </div>

        <div class="progress-wrap">
          <div class="progress-labels">
            <span>Health ${ag.health < 60 ? '⚠' : ''}</span>
            <span style="color:${healthColor}">${ag.health.toFixed(0)}%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${healthPct}%;background:${healthColor}"></div></div>
        </div>

        <div class="stats-grid">
          <div class="stat-box">
            <div class="stat-label">CTX (W/ REST)</div>
            <div class="stat-value" style="color:${ag.ctx > 20000 ? '#f59e0b' : '#e2e8f0'}">${(ag.ctx/1000).toFixed(1)}K</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">CTX (NO REST)</div>
            <div class="stat-value" style="color:#ef4444">${(ag.ctxNoRest/1000).toFixed(1)}K</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">TASKS DONE</div>
            <div class="stat-value">${ag.tasks}</div>
          </div>
        </div>
      </div>`;
    });

    html += `</div></div>`;
  });

  // Comparison panel
  html += `<div class="compare">
    <div class="compare-title">CONTINUOUS vs WHITE ROOM — LIVE COMPARISON</div>
    <div class="compare-grid">
      <div class="compare-no-rest">
        <div style="font-size:7px;color:#ef4444;margin-bottom:4px;letter-spacing:1px">WITHOUT WHITE ROOM</div>
        <div style="font-size:20px;font-weight:700;color:#fca5a5">${(tNoRest/1000).toFixed(1)}K tokens</div>
        <div style="font-size:8px;color:#ef4444;margin:2px 0">$${costNR.toFixed(4)} | ${energyNR.toFixed(5)} kWh</div>
        <div style="font-size:7px;color:#7f1d1d;margin-top:4px">Context grows forever. Every call pays compounding cost. Agent health degrades with no recovery.</div>
      </div>
      <div class="compare-rest">
        <div style="font-size:7px;color:#4ade80;margin-bottom:4px;letter-spacing:1px">WITH WHITE ROOM</div>
        <div style="font-size:20px;font-weight:700;color:#86efac">${(tSent/1000).toFixed(1)}K tokens</div>
        <div style="font-size:8px;color:#4ade80;margin:2px 0">$${cost.toFixed(4)} | ${energy.toFixed(5)} kWh</div>
        <div style="font-size:7px;color:#166534;margin-top:4px">Context resets at handover. Relief agent starts fresh. ${savePct > 0 ? savePct.toFixed(1)+'% fewer tokens. Health recovers during rest.' : 'Savings accumulate after first handover.'}</div>
      </div>
    </div>
  </div>`;

  document.getElementById("agents-col").innerHTML = html;
}

function renderLog() {
  const el = document.getElementById("log-container");
  if (!logEntries.length) { el.innerHTML = '<div class="log-empty">Press RUN to start</div>'; return; }
  el.innerHTML = logEntries.map(e =>
    `<div class="log-entry" style="border-left-color:${LOG_COLORS[e.type]||LOG_COLORS.info}"><span>${e.time} ${e.msg}</span></div>`
  ).join("");
}

function renderAll() { renderBanner(); renderAgents(); }

// ─── Mode switching ──────────────────────────────────────────
function switchMode(m) {
  resetAll();
  mode = m;
  document.getElementById("btn-sim").className  = "mode-btn" + (m === "sim"  ? " active" : "");
  document.getElementById("btn-live").className = "mode-btn" + (m === "live" ? " active" : "");
  document.getElementById("sim-controls").style.display  = m === "sim"  ? "inline" : "none";
  document.getElementById("live-controls").style.display = m === "live" ? "inline" : "none";
  document.getElementById("speed-sel").style.display     = m === "sim"  ? "inline" : "none";
  document.getElementById("footer-left").textContent = "White Room v0.4 | " + (m === "live" ? "Live Monitor: " + WHITEROOM_URL : "Simulation Mode");
}

function resetAll() {
  running = false;
  if (simInterval)  clearInterval(simInterval);
  if (liveInterval) clearInterval(liveInterval);
  simInterval = liveInterval = null;
  tk = 0; selected = null; logEntries = [];
  initAgents();
  document.getElementById("dot").className = "dot";
  document.getElementById("btn-run").textContent = "RUN";
  document.getElementById("btn-run").className = "btn-run";
  document.getElementById("btn-live-run").textContent = "RUN LIVE";
  document.getElementById("btn-live-run").className = "btn-run";
  document.getElementById("btn-live-run").disabled = false;
  document.getElementById("status-txt").textContent = "Ready";
  document.getElementById("fleet-bar").style.display = "none";
  renderAll(); renderLog();
}

// ─── Simulation ──────────────────────────────────────────────
function toggleSim() {
  if (running) {
    running = false;
    clearInterval(simInterval);
    document.getElementById("dot").className = "dot";
    document.getElementById("btn-run").textContent = "RUN";
    document.getElementById("btn-run").className = "btn-run";
  } else {
    running = true;
    document.getElementById("dot").className = "dot on";
    document.getElementById("btn-run").textContent = "STOP";
    document.getElementById("btn-run").className = "btn-run stop";
    simInterval = setInterval(simTick, 1200 / spd);
  }
}

function simTick() {
  tk++;
  document.getElementById("status-txt").textContent = "Sim: " + ((tk * 30) / 60).toFixed(1) + "h elapsed";

  agents.forEach(ag => {
    if (ag.status === "resting") {
      ag.restTick++;
      // Health recovers during rest
      ag.health = Math.min(ag.baseline, ag.health + (ag.baseline - ag.health) * 0.12);
      ag.healthHist.push(ag.health);
      if (ag.restTick >= REST_TICKS) {
        ag.baseline = Math.min(130, ag.baseline + 2);
        ag.health = ag.baseline;
        ag.status = "alarm";
        ag.alarms++;
        addLog(`ALARM ✓ ${ag.id.toUpperCase()} rested — health restored to ${ag.health.toFixed(0)}%`, "alarm");
      }
      return;
    }
    if (ag.status === "alarm" || ag.status === "handing_over") return;

    if (ag.status === "working" || ag.status === "overtime") {
      const task = TASKS[Math.floor(Math.random() * TASKS.length)];
      ag.tasks++;
      ag.minutesWorked += task.minutes;
      ag.watchTick++;

      // WITH WhiteRoom: context is what's in THIS agent's window
      ag.ctx += task.tokens;

      // WITHOUT WhiteRoom: context grows forever (no one ever rests or resets)
      ag.ctxNoRest += task.tokens;

      // Token cost: WITH rest = ctx (current window), WITHOUT = ctxNoRest (ever-growing)
      ag.sent += ag.ctx;
      ag.sentNoRest += ag.ctxNoRest;

      // Health decay — harder tasks = more fatigue
      const fatigue = (task.tokens / 1000) * 1.2 + (ag.status === "overtime" ? 3 : 0);
      ag.health = Math.max(15, ag.health - fatigue);
      ag.healthHist.push(ag.health);

      ag.ctxHist.push({ tokens: ag.ctx });

      if (ag.watchTick >= WATCH_TICKS && ag.status !== "overtime") {
        ag.status = "overtime";
        addLog(`⚠ OVERTIME: ${ag.id.toUpperCase()} exceeded 6h watch — health declining fast`, "overtime");
      }

      // Try handover
      if (ag.watchTick >= WATCH_TICKS) {
        const pid = partner(ag.id);
        const pr = agents.find(x => x.id === pid);
        if (pr && (pr.status === "alarm" || (pr.status === "resting" && pr.restTick >= REST_TICKS - 2))) {
          const beforeCtx = ag.ctx;
          const beforeCtxNR = ag.ctxNoRest;
          ag.status = "handing_over";
          ag.handovers++;

          // Relief agent inherits ctxNoRest (continuous baseline) but starts fresh ctx
          pr.status = "working";
          pr.watchTick = 0;
          pr.watchNum++;
          pr.ctx = Math.min(1500, Math.floor(beforeCtx * 0.04)); // ~4% context summary handed over
          pr.ctxNoRest = beforeCtxNR + pr.ctx; // no-rest world: just keeps growing
          pr.handovers++;
          pr.ctxHist.push({ tokens: pr.ctx });

          addLog(`🔄 HANDOVER: ${ag.id.toUpperCase()} → ${pr.id.toUpperCase()} | ctx: ${(beforeCtx/1000).toFixed(1)}K → ${(pr.ctx/1000).toFixed(1)}K (${((1-pr.ctx/beforeCtx)*100).toFixed(0)}% cut)`, "handover");

          setTimeout(() => {
            ag.status = "resting";
            ag.restTick = 0;
            ag.ctx = 0;
            ag.ctxHist.push({ tokens: 0 });
            addLog(`💤 REST: ${ag.id.toUpperCase()} → White Room. Health: ${ag.health.toFixed(0)}% → recovering...`, "rest");
            renderAll();
          }, 200);
        }
      }
    }
  });
  renderAll();
}

// ─── Live Monitor ────────────────────────────────────────────
async function toggleLive() {
  if (running) {
    running = false;
    clearInterval(liveInterval);
    document.getElementById("dot").className = "dot";
    document.getElementById("btn-live-run").textContent = "RUN LIVE";
    document.getElementById("btn-live-run").className = "btn-run";
    document.getElementById("status-txt").textContent = "Stopped";
    return;
  }

  running = true;
  document.getElementById("btn-live-run").textContent = "STOP";
  document.getElementById("btn-live-run").className = "btn-run stop";
  document.getElementById("dot").className = "dot on";
  document.getElementById("status-txt").textContent = "Polling WhiteRoom...";

  // init display agents
  agents = [];
  PAIRS.forEach(p => {
    agents.push(mkAgent(p.a, false));
    agents.push(mkAgent(p.b, false));
  });

  await pollLive();
  liveInterval = setInterval(pollLive, 15000); // poll every 15s
}

async function pollLive() {
  const agentIds = ["bravo", "delta", "foxtrot"];
  let anyData = false;

  for (const id of agentIds) {
    try {
      const res = await fetch(`${WHITEROOM_URL}/api/white-room`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "check_watch", fleet_id: FLEET_ID, agent_id: id })
      });
      const data = await res.json();
      if (data.error) continue;

      anyData = true;

      // Find or create agent in display
      let ag = agents.find(a => a.id === id);
      if (!ag) {
        ag = mkAgent({ id, role: id.charAt(0).toUpperCase() + id.slice(1), color: "#22c55e" }, false);
        agents.push(ag);
      }

      // Map real WhiteRoom data to display state
      const prevTasks = ag.tasks;
      ag.status = data.status === "resting" ? "resting" : data.needsHandover ? "overtime" : "working";
      ag.watchNum = data.watchNumber || 1;
      ag.tasks = data.tasksCompleted || 0;
      ag.minutesWorked = data.minutesWorked || 0;

      // Tokens: real tokens used = sentNoRest baseline
      const realTokens = data.tokensUsed || 0;
      ag.sentNoRest = realTokens; // no-rest world: same tokens, growing context

      // With WhiteRoom: estimate context savings based on handovers
      // Each handover resets context to ~4%, so savings compound
      const handoverCount = ag.handovers || 0;
      const contextReductionFactor = Math.pow(0.5, handoverCount); // each handover ~halves avg context
      ag.sent = Math.floor(realTokens * (handoverCount > 0 ? contextReductionFactor + 0.4 : 1));
      ag.ctx = realTokens;
      ag.ctxNoRest = realTokens;

      // Watch progress
      const pctDone = parseFloat(data.percentComplete) || 0;
      ag.watchTick = Math.floor((pctDone / 100) * WATCH_TICKS);

      // Health: decays with work, recovers at rest
      if (ag.status === "working") {
        ag.health = Math.max(20, 100 - (pctDone * 0.7));
      } else if (ag.status === "resting") {
        ag.health = Math.min(100, ag.health + 10);
        ag.restTick = Math.min(REST_TICKS, ag.restTick + 10);
      }

      if (ag.tasks > prevTasks) {
        addLog(`✓ ${id.toUpperCase()}: task complete | ${data.minutesWorked}min worked | ${(realTokens/1000).toFixed(1)}K tokens | ${data.percentComplete} watch`, "task");
      }

    } catch(e) {
      addLog(`⚠ Cannot reach ${id}: ${e.message}`, "error");
    }
  }

  if (anyData) {
    document.getElementById("status-txt").textContent = "Live — updated " + new Date().toLocaleTimeString();
    renderAll();
  }
}

// ─── Init ────────────────────────────────────────────────────
initAgents();
renderAll();
renderLog();
</script>
