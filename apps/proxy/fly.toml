app = "whiteroom-proxy"
primary_region = "iad"

[build]
  dockerfile = "../../Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/v1/health"
  timeout = "5s"

[env]
  PORT = "8080"
  NODE_ENV = "production"
